name: Build Stage Image & Deploy (POS)

on:
  push:
    branches: ["Development"]

jobs:
  build-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        run: |
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/quidpath_pos:stage-${TIMESTAMP}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.stage
          push: true
          tags: ${{ steps.tag.outputs.image_tag }}
          platforms: linux/amd64,linux/arm64/v8

      - name: Encode docker-compose.stage.yml
        id: compose
        run: echo "b64=$(base64 -w 0 docker-compose.stage.yml)" >> $GITHUB_OUTPUT

      - name: Prepare secrets payload
        id: secrets
        run: |
          json="{}"
          add() { json=$(echo "$json" | jq --arg k "$1" --arg v "$2" '.[$k]=$v'); }

          add SECRET_KEY "${{ secrets.SECRET_KEY }}"
          add JWT_SECRET_KEY "${{ secrets.JWT_SECRET_KEY }}"
          add POS_SERVICE_SECRET "${{ secrets.POS_SERVICE_SECRET }}"
          add INVENTORY_SERVICE_SECRET "${{ secrets.INVENTORY_SERVICE_SECRET }}"
          add POSTGRES_DB "${{ secrets.POS_POSTGRES_DB_STAGE }}"
          add POSTGRES_USER "${{ secrets.POS_POSTGRES_USER_STAGE }}"
          add POSTGRES_PASSWORD "${{ secrets.POS_POSTGRES_PASSWORD_STAGE }}"
          add DATABASE_URL "${{ secrets.POS_DATABASE_URL_STAGE }}"
          add ALLOWED_HOSTS "stage-pos.quidpath.com,stage-api.quidpath.com,localhost,127.0.0.1,0.0.0.0"
          add ERP_BACKEND_URL "http://django-backend-stage:8000"
          add INVENTORY_SERVICE_URL "http://inventory-backend-stage:8000"
          add REDIS_URL "redis://redis:6379/0"
          add DJANGO_SETTINGS_MODULE "pos_service.settings.stage"

          echo "secrets_json=$(echo $json | jq -c .)" >> $GITHUB_OUTPUT

      - name: Trigger deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_PAT }}
          repository: stevendegwa/infra
          event-type: deploy-app
          client-payload: |
            {
              "app_repo": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "env": "stage",
              "sha": "${{ github.sha }}",
              "image_tag": "${{ steps.tag.outputs.image_tag }}",
              "docker_compose_b64": "${{ steps.compose.outputs.b64 }}",
              "env_secrets": ${{ steps.secrets.outputs.secrets_json }}
            }

name: Build Prod Image & Deploy (POS)

on:
  push:
    branches: ["main", "master"]

jobs:
  build-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        run: |
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/quidpath_pos:prod-${TIMESTAMP}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tag.outputs.image_tag }}
          platforms: linux/amd64,linux/arm64/v8

      - name: Encode docker-compose.yml
        id: compose
        run: echo "b64=$(base64 -w 0 docker-compose.yml)" >> $GITHUB_OUTPUT

      - name: Prepare secrets payload
        id: secrets
        run: |
          json="{}"
          add() { json=$(echo "$json" | jq --arg k "$1" --arg v "$2" '.[$k]=$v'); }

          add SECRET_KEY "${{ secrets.SECRET_KEY }}"
          add JWT_SECRET_KEY "${{ secrets.JWT_SECRET_KEY }}"
          # Own secret
          add POS_SERVICE_SECRET "${{ secrets.POS_SERVICE_SECRET }}"
          # Cross-service secrets
          add ERP_SERVICE_SECRET "${{ secrets.ERP_SERVICE_SECRET }}"
          add INVENTORY_SERVICE_SECRET "${{ secrets.INVENTORY_SERVICE_SECRET }}"
          add CRM_SERVICE_SECRET "${{ secrets.CRM_SERVICE_SECRET }}"
          add HRM_SERVICE_SECRET "${{ secrets.HRM_SERVICE_SECRET }}"
          add PROJECTS_SERVICE_SECRET "${{ secrets.PROJECTS_SERVICE_SECRET }}"
          add BILLING_SERVICE_SECRET "${{ secrets.BILLING_SERVICE_SECRET }}"
          # Database
          add POSTGRES_DB "${{ secrets.POS_POSTGRES_DB }}"
          add POSTGRES_USER "${{ secrets.POS_POSTGRES_USER }}"
          add POSTGRES_PASSWORD "${{ secrets.POS_POSTGRES_PASSWORD }}"
          add DATABASE_URL "${{ secrets.POS_DATABASE_URL }}"
          # Service URLs
          add ALLOWED_HOSTS "pos.quidpath.com,api.quidpath.com,localhost,127.0.0.1"
          add ERP_BACKEND_URL "http://51.77.147.233:8004"
          add INVENTORY_SERVICE_URL "http://51.77.147.233:8014"
          add CRM_SERVICE_URL "http://51.77.147.233:8016"
          add HRM_SERVICE_URL "http://51.77.147.233:8008"
          add REDIS_URL "redis://redis:6379/0"
          add DJANGO_SETTINGS_MODULE "pos_service.settings.prod"

          echo "secrets_json=$(echo $json | jq -c .)" >> $GITHUB_OUTPUT

      - name: Trigger deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_PAT }}
          repository: stevendegwa/infra
          event-type: deploy-app
          client-payload: |
            {
              "app_repo": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "env": "prod",
              "sha": "${{ github.sha }}",
              "image_tag": "${{ steps.tag.outputs.image_tag }}",
              "docker_compose_b64": "${{ steps.compose.outputs.b64 }}",
              "env_secrets": ${{ steps.secrets.outputs.secrets_json }}
            }
